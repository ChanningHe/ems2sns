services:
  ems2sns:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64
    image: ems2sns:latest
    container_name: ems2sns
    restart: unless-stopped

    environment:
      # Override any config value via EMS2SNS_ prefixed env vars
      # e.g. EMS2SNS_TELEGRAM_BOT_TOKEN overrides telegram.bot_token

      - EMS2SNS_TELEGRAM_ENABLED=${EMS2SNS_TELEGRAM_ENABLED:-true}
      - EMS2SNS_TELEGRAM_BOT_TOKEN=${EMS2SNS_TELEGRAM_BOT_TOKEN:-}
      - EMS2SNS_TELEGRAM_ALLOWED_USER_IDS=${EMS2SNS_TELEGRAM_ALLOWED_USER_IDS:-}
      - EMS2SNS_TELEGRAM_ALLOWED_CHAT_IDS=${EMS2SNS_TELEGRAM_ALLOWED_CHAT_IDS:-}

      - EMS2SNS_DISCORD_ENABLED=${EMS2SNS_DISCORD_ENABLED:-false}
      - EMS2SNS_DISCORD_BOT_TOKEN=${EMS2SNS_DISCORD_BOT_TOKEN:-}

      - EMS2SNS_TRACKING_POLL_INTERVAL=${EMS2SNS_TRACKING_POLL_INTERVAL:-30m}
      - EMS2SNS_TRACKING_SEVENTEEN_TRACK_TOKEN=${EMS2SNS_TRACKING_SEVENTEEN_TRACK_TOKEN:-}

      - EMS2SNS_STORAGE_PATH=/app/data/subscriptions.json

      - TZ=${TZ:-Asia/Tokyo}

    volumes:
      - ./data:/app/data
      # Optional: mount config file and uncomment the command below
      # - ./config.yaml:/app/config.yaml:ro

    # Default: no config file, relies purely on environment variables.
    # Uncomment below to use a config file instead:
    # command: ["/app/ems2sns", "-config", "/app/config.yaml"]
